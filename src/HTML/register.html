<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/css/resgister.css">
    <title>Registro</title>
</head>
<body>
    <div class="login-container">
        <form class="login-form" id="registerForm">
            
            <img src="/src/assets/logo.png" class="logo">

            <h2>Crear Cuenta</h2>

            <input type="text" id="regNombre" placeholder="Nombre completo" required>
            <input type="email" id="regEmail"  placeholder="Correo electrónico" required>
            <input type="password" id="regPassword" placeholder="Contraseña" required>
            <input type="password" id="regConfirm" placeholder="Confirmar contraseña" required>

            <p id="regError" style="color: red; display: none;"></p>

            <button type="submit" >Registrarse</button>

            <p class="register">
                ¿Ya tienes cuenta? <a href="/src/HTML/login.html">Inicia sesión</a>
            </p>

        </form>
    </div>
    <script src="/src/js/register.js"></script>
</body>
</html>
