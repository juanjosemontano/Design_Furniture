<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/css/contact.css">
    <title>Design_Furniture</title>
</head>
<body>
    <div class="container_title">
        <h1 class="title">DESIGN FURNITURE</h1>
        <p class="container_text">Diseños exclusivos</p>
    </div>

    <div class="redes_sociales">
        <p>Redes Sociales</p>
    </div>

    <div class="container_redes">
        <li class="whatsapp">
            <div class="icon-circle">
                <img src="/src/assets/icon_whatsapp.png" alt="WhatsApp" class="icon">
            </div>
            <span>WhatsApp</span>
        </li>
        <li class="instagram">
            <div class="icon-circle">
                <img src="/src/assets/icon_ig.png" alt="Instagram" class="icon">
            </div>
            <span>Instagram</span>
        </li>
        <li class="facebook">
            <div class="icon-circle">
                <img src="/src/assets/icon_facebook.png" alt="Facebook" class="icon">
            </div>
            <span>Facebook</span>
        </li>
        <li class="twitter">
            <div class="icon-circle">
                <img src="/src/assets/icon_x.png" alt="X" class="icon">
            </div>
            <span>X</span>
        </li>
    </div>
    <div id="mensaje_contacto"></div>
    <script src="/src/js/contact.js"></script>
</body>
</body>
</html>
